<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<title>نتایج پرسشنامه</title>

<style>
  body {
    font-family: sans-serif;
    direction: rtl;
    text-align: right;
    padding: 20px;
    background: #f7f7f7;
  }
  h2 { color: #333; }
  #btn {
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    margin: 10px 0;
  }
  .result-block {
    background: #fff;
    border-radius: 8px;
    padding: 15px;
    margin-top: 15px;
    box-shadow: 0 0 5px rgba(0,0,0,0.1);
  }
  .label { font-weight: bold; }
  .green { color: green; font-weight: bold; }
  .yellow { color: orange; font-weight: bold; }
  .red { color: red; font-weight: bold; }
  .error {
    color: red;
    font-weight: bold;
    margin-top: 10px;
  }
</style>
</head>

<body>

<h2>نتایج پرسشنامه</h2>
<p>برای دریافت و نمایش آخرین نتایج ثبت‌شده، روی دکمه زیر کلیک کنید.</p>

<button id="btn" onclick="fetchResults()">دریافت و نمایش نتایج</button>

<div id="output"></div>

<script>

// 🔥 لینک Web App جدید تو
const API_URL = "https://script.google.com/macros/s/AKfycbxweJl2eSQY0k5trf5hFmFWW1x_zDBCbzUA8a1i7d0KtBOfF_XYjVkmvE2YoRhGahJb/exec";

// 🔥 تبدیل بله/خیر برای DSHI
function convertDSHI(v) {
  if (v === "بله") return 1;
  if (v === "خیر") return 0;
  return 0;
}

// 🔥 رنگ‌بندی
function colorize(score, low, mid) {
  if (score <= low) return "<span class='green'>سبز</span>";
  if (score <= mid) return "<span class='yellow'>زرد</span>";
  return "<span class='red'>قرمز</span>";
}

async function fetchResults() {
  const out = document.getElementById("output");
  out.innerHTML = "<p>در حال دریافت داده‌ها...</p>";

  try {
    const res = await fetch(API_URL);
    if (!res.ok) {
      out.innerHTML = "<p class='error'>خطا در ارتباط با سرور.</p>";
      return;
    }

    const data = await res.json();

    // 🔥 داده‌ها یک آرایه هستند (۹۳ ستون)
    // ستون شروع پرسشنامه‌ها = 29
    const start = 29;

    // 🔥 محاسبه PNI (۲۸ سؤال)
    let PNI = 0;
    for (let i = start; i < start + 28; i++) {
      PNI += Number(data[i]);
    }

    // 🔥 BFNE (۱۲ سؤال)
    let BFNE = 0;
    let bfneStart = start + 28;
    for (let i = bfneStart; i < bfneStart + 12; i++) {
      BFNE += Number(data[i]);
    }

    // 🔥 IUS (۱۲ سؤال)
    let IUS = 0;
    let iusStart = bfneStart + 12;
    for (let i = iusStart; i < iusStart + 12; i++) {
      IUS += Number(data[i]);
    }

    // 🔥 PFAI (۲۵ سؤال)
    let PFAI = 0;
    let pfaiStart = iusStart + 12;
    for (let i = pfaiStart; i < pfaiStart + 25; i++) {
      PFAI += Number(data[i]);
    }

    // 🔥 DSHI (۱۷ سؤال بله/خیر)
    let DSHI = 0;
    let dshiStart = pfaiStart + 25;
    for (let i = dshiStart; i < dshiStart + 17; i++) {
      DSHI += convertDSHI(data[i]);
    }

    // 🔥 نمایش نتایج
    let html = "<div class='result-block'>";
    html += "<h3>نتایج آخرین پاسخ ثبت‌شده</h3>";

    html += "<p><span class='label'>PNI:</span> " + PNI + " — " + colorize(PNI, 60, 90) + "</p>";
    html += "<p><span class='label'>BFNE:</span> " + BFNE + " — " + colorize(BFNE, 15, 25) + "</p>";
    html += "<p><span class='label'>IUS:</span> " + IUS + " — " + colorize(IUS, 20, 35) + "</p>";
    html += "<p><span class='label'>PFAI:</span> " + PFAI + " — " + colorize(PFAI, 40, 60) + "</p>";

    if (DSHI === 0) {
      html += "<p><span class='label'>DSHI:</span> " + DSHI + " — <span class='green'>بدون رفتار آسیب‌رسان</span></p>";
    } else if (DSHI <= 3) {
      html += "<p><span class='label'>DSHI:</span> " + DSHI + " — <span class='yellow'>رفتار آسیب‌رسان خفیف</span></p>";
    } else {
      html += "<p><span class='label'>DSHI:</span> " + DSHI + " — <span class='red'>رفتار آسیب‌رسان متوسط/بالا</span></p>";
    }

    html += "<p>از مشارکت شما سپاسگزاریم.</p>";
    html += "</div>";

    out.innerHTML = html;

  } catch (e) {
    out.innerHTML = "<p class='error'>خطای غیرمنتظره رخ داد.</p>";
  }
}

</script>

</body>
</html>
